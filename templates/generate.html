<!DOCTYPE html>
<html>
<head>
  <title>Generate Blog</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 8px; width: 250px; }
    button { padding: 8px 12px; margin-left: 10px; }
    pre { background: #f5f5f5; padding: 15px; margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>

<h2>🚀 Generate Blog</h2>

<input type="text" id="keyword" placeholder="Enter keyword">
<button onclick="generate()">Generate</button>

<pre id="result">Result will appear here...</pre>

<script>
async function generate() {
    const keyword = document.getElementById("keyword").value;

    if (!keyword) {
        alert("Please enter keyword");
        return;
    }

    document.getElementById("result").innerText = "Generating...";

    try {
        const res = await fetch("/api/generate/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-API-KEY": "mysecret123"
            },
            body: JSON.stringify({ keyword })
        });

        // 🔥 पहले raw text लो (important)
        const text = await res.text();

        try {
            // 🔥 JSON parse try करो
            const data = JSON.parse(text);
            document.getElementById("result").innerText =
                JSON.stringify(data, null, 2);
        } catch (e) {
            // ❌ अगर HTML आया तो पूरा दिखाओ
            document.getElementById("result").innerText =
                "Non-JSON Response (Error Page):\n\n" + text;
        }

    } catch (err) {
        document.getElementById("result").innerText =
            "Fetch Error: " + err;
        console.error(err);
    }
}
</script>

</body>
</html>
